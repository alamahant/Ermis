app-id: io.github.alamahant.Ermis
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: Ermis
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
modules:
  - name: Ermis
    buildsystem: cmake-ninja
    config-opts:
      - -DFLATHUB_BUILD=ON
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: .

      
